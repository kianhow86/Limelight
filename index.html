function mkSil(x,y,w,h){

  s+='<radialGradient id="gB" cx="50%" cy="75%" r="45%"><stop offset="0%" stop-color="#0A2E6E" stop-opacity="0.42"/><stop offset="100%" stop-color="#071018" stop-opacity="0"/></radialGradient>';
  s+='</defs>';
